name: subscription-manager

# Public multi-platform GHCR images; registry authentication is not required.
# IMAGE_TAG defaults to the newest successful main build.
x-backend-image: &backend-image ghcr.io/evergardener/subscription-manager-backend:${IMAGE_TAG:-latest}

x-backend-environment: &backend-environment
  DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL for PostgreSQL 16 or newer}
  ENVIRONMENT: production
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  COOKIE_SECURE: "true"
  API_RATE_LIMIT_PER_MINUTE: ${API_RATE_LIMIT_PER_MINUTE:-300}
  LOGIN_RATE_LIMIT_PER_MINUTE: ${LOGIN_RATE_LIMIT_PER_MINUTE:-10}
  NOTIFICATION_MODE: ${NOTIFICATION_MODE:-external}
  SESSION_ABSOLUTE_HOURS: ${SESSION_ABSOLUTE_HOURS:-168}
  SESSION_IDLE_MINUTES: ${SESSION_IDLE_MINUTES:-60}
  REMINDER_SCAN_DAYS: ${REMINDER_SCAN_DAYS:-30}
  REMINDER_GRACE_DAYS: ${REMINDER_GRACE_DAYS:-3}
  REMINDER_MAX_ATTEMPTS: ${REMINDER_MAX_ATTEMPTS:-5}
  REMINDER_LEASE_SECONDS: ${REMINDER_LEASE_SECONDS:-120}

services:
  migrate:
    image: *backend-image
    environment: *backend-environment
    command: ["alembic", "upgrade", "head"]
    networks: [internal]
    restart: "no"

  backend:
    image: *backend-image
    environment: *backend-environment
    depends_on:
      migrate: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]
    restart: unless-stopped

  scheduler:
    image: *backend-image
    environment:
      <<: *backend-environment
      SCHEDULER_HEARTBEAT_SECONDS: ${SCHEDULER_HEARTBEAT_SECONDS:-60}
      REMINDER_SCAN_INTERVAL_MINUTES: ${REMINDER_SCAN_INTERVAL_MINUTES:-5}
    command: ["python", "-m", "app.scheduler"]
    depends_on:
      migrate: { condition: service_completed_successfully }
    networks: [internal]
    restart: unless-stopped

  frontend:
    image: ghcr.io/evergardener/subscription-manager-frontend:${IMAGE_TAG:-latest}
    depends_on:
      backend: { condition: service_healthy }
    ports:
      - "${SERVICE_BIND_ADDRESS:-127.0.0.1}:${SERVICE_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]
    restart: unless-stopped

networks:
  internal: {}
