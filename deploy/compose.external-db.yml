name: hermes-subscription-manager

x-backend-environment: &backend-environment
  DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL for PostgreSQL 16 or newer}
  ENVIRONMENT: production
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  COOKIE_SECURE: "true"
  API_RATE_LIMIT_PER_MINUTE: ${API_RATE_LIMIT_PER_MINUTE:-300}
  LOGIN_RATE_LIMIT_PER_MINUTE: ${LOGIN_RATE_LIMIT_PER_MINUTE:-10}
  NTFY_BASE_URL: ${NTFY_BASE_URL:-https://ntfy.sh}
  NTFY_TOPIC: ${NTFY_TOPIC:-replace-me}
  REMINDER_SCAN_DAYS: ${REMINDER_SCAN_DAYS:-30}
  REMINDER_GRACE_DAYS: ${REMINDER_GRACE_DAYS:-3}
  REMINDER_MAX_ATTEMPTS: ${REMINDER_MAX_ATTEMPTS:-5}
  REMINDER_LEASE_SECONDS: ${REMINDER_LEASE_SECONDS:-120}

services:
  migrate:
    build: ../backend
    environment: *backend-environment
    command: ["alembic", "upgrade", "head"]
    networks: [internal]
    restart: "no"

  backend:
    build: ../backend
    environment: *backend-environment
    depends_on:
      migrate: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]
    restart: unless-stopped

  scheduler:
    build: ../backend
    environment:
      <<: *backend-environment
      SCHEDULER_HEARTBEAT_SECONDS: ${SCHEDULER_HEARTBEAT_SECONDS:-60}
    command: ["python", "-m", "app.scheduler"]
    depends_on:
      migrate: { condition: service_completed_successfully }
    networks: [internal]
    restart: unless-stopped

  frontend:
    build: ../frontend
    depends_on:
      backend: { condition: service_healthy }
    labels:
      traefik.enable: "true"
      traefik.http.routers.hermes.rule: Host(`${HERMES_DOMAIN:?set HERMES_DOMAIN}`)
      traefik.http.routers.hermes.entrypoints: websecure
      traefik.http.routers.hermes.tls: "true"
      traefik.http.routers.hermes.tls.certresolver: ${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      traefik.http.services.hermes.loadbalancer.server.port: "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal, traefik]
    restart: unless-stopped

networks:
  internal: { internal: true }
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
